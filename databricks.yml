bundle:
  name: mcp-server-grants-gov
  databricks_cli_version: ">=0.218.0"

# ONLY YAML/JSON bundle config files belong here
include:
  - 'bundle/resources/*.yml'
  - 'app.yaml'                # OK (YAML)
  # DO NOT include dist/*.whl, src/**, or pyproject.toml here

# What files to sync to workspace during deploy (non-YAML resources)
sync:
  include:
    - 'dist/*.whl'            # include built wheel(s) for deploy
    - 'src/**'                # include source if you want it copied to workspace
  exclude:
    - '.git/**'
    - '.venv/**'

# Artifacts: describe how to build and where the built files are
artifacts:
  default:
    type: whl
    path: .                    # path where build runs (setup.py/pyproject root)
    build: python -m build --no-isolation
    dynamic_version: false
    files:
      - source: dist/*.whl     # <-- use 'files.source' (not 'output') to point to built wheel(s)


targets:
  dev:
    default: true
    workspace:
      host: ${env.DATABRICKS_HOST}
      root_path: /Workspace/mcp-tiger-team/mcp-server-repos
    variables:
      ENV: dev
